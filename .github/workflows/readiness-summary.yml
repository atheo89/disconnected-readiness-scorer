name: Disconnected Readiness Summary

on:
  schedule:
    - cron: '17 * * * *'
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:
    inputs:
      repo:
        description: "Single repo to score (e.g. odh-dashboard). Leave empty to score all."
        required: false
        type: string
        default: ""
      parallel:
        description: "Number of repos to score concurrently"
        required: false
        type: string
        default: "4"

jobs:
  summary:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          persist-credentials: false

      - uses: actions/setup-python@a309ff8b426b58ec0e2a45f0f869d46889d02405 # v6.2.0
        with:
          python-version: "3.12"

      - name: Install uv
        uses: astral-sh/setup-uv@fac544c07dec837d0ccb6301d7b5580bf5edae39 # v8.2.0

      - name: Install dependencies
        run: |
          uv sync --extra report --frozen
          make install-arch-analyzer

      - name: Run batch scorer
        env:
          INPUT_REPO: ${{ inputs.repo }}
          INPUT_PARALLEL: ${{ inputs.parallel || '4' }}
        run: |
          set -euo pipefail
          args=(--parallel "$INPUT_PARALLEL" --verbose)
          if [ -n "$INPUT_REPO" ]; then
            args+=(--repo "$INPUT_REPO")
          fi
          uv run run_all.py "${args[@]}" || true

      - name: Upload reports
        if: always()
        uses: actions/upload-artifact@043fb46d1a93c77aae656e7c1c64a875d1fc6a0a # v7.0.1
        with:
          name: readiness-reports
          path: reports/
          retention-days: 30
